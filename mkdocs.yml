site_name: 桃花潭
theme: 
  name: material
  icon:
    logo: material/library
  favicon: https://cs.haohaha.cn/image/favicon.png
  palette:
    - scheme: default # 日间模式
      primary: brown # 上方的
      accent: yellow # 链接等可交互元件的高亮色
      toggle:
        icon: material/weather-night # 图标
        name: 切换至夜间模式 # 鼠标悬浮提示
    # - scheme: slate # 夜间模式
    #   primary: brown 
    #   accent: yellow
    #   toggle:
    #     icon: material/weather-sunny
    #     name: 切换至日间模式

  features:
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - navigation.expand # 展开
    # navigation.prune # 折叠
    - search.suggest
    - search.highlight
    - content.code.copy
    - Instant Loading
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    # Anchor tracking
    - navigation.tracking
  language: zh

# 这里写目录
nav:
  - Home: http://haohaha.cn
  - Be_Rational: http://cs.haohaha.cn
  - Chat_Polka: http://chat.haohaha.cn 
  - Algorithm: http://alg.haohaha.cn
  - PeachLake: 
    - index.md
    - 经验贴: 
      - 01-AIO 配置流程: Server/01-AIO_Server.md
      - 02-PVE 部署: Server/02-PVE_deploy.md
      - 03-PVE 核显直通: Server/03-CoreGPU_Passthrough.md
      - 04-PVE 解决空间自增长: Server/PVE_Disk.md
      - 05-本地服务器远程连接: Server/05-SSH_Remote_Local.md
      - 06-部署 NextCloud-Docker: Server/06-nextcloud_docker.md
      - 07-SSL 证书部署与更新: Server/07-ssl_update.md
    - ToDo:
      - 许愿池里的忘吧🐢: Todo/list.md

extra_css:
  - mkdocs/css/no-footer.css # 不使用底部的翻页
  - mkdocs/extra_admonition.css # 自定义admonition

markdown_extensions:
    # Admonitions
    - admonition
    - pymdownx.details
    - pymdownx.superfences
    # Icons, Emojis
    - attr_list
    - pymdownx.emoji:
        emoji_index: !!python/name:material.extensions.emoji.twemoji
        emoji_generator: !!python/name:material.extensions.emoji.to_svg
    # Formatting
    - pymdownx.critic
    - pymdownx.caret
    - pymdownx.keys
    - pymdownx.mark
    - pymdownx.tilde
    # Diagrams
    - pymdownx.superfences:
        custom_fences:
          - name: mermaid
            class: mermaid
            format: !!python/name:pymdownx.superfences.fence_code_format
    - pymdownx.tasklist:
        custom_checkbox: true
    
extra:
  homepage: http://haohaha.cn
  social: # icons
    - icon: fontawesome/brands/github
      link: https://github.com/Haohahahaha/PeachBlossom-Lake
      name: GitHub | Haohahahaha
    - icon: simple/githubactions
      link: https://github.com/Haohahahaha/PeachBlossom-Lake/actions
      name: GitHub Actions
